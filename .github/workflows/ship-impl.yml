name: Ship Implementation

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: false
      SNAPCRAFT_TOKEN:
        required: false

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Get latest tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/light-cut-soundz/light-cut-soundz/git/refs/tags --jq '.[-1].ref | split("/") | .[-1]')
          echo "name=$TAG" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: LightCutSoundZ ${{ steps.tag.outputs.name }}
          releaseBody: |
            ## LightCutSoundZ ${{ steps.tag.outputs.name }}

            ### Téléchargements

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon | `LightCutSoundZ_*_aarch64.dmg` |
            | macOS Intel | `LightCutSoundZ_*_x64.dmg` |
            | Linux AppImage | `LightCutSoundZ_*_amd64.AppImage` |
            | Linux Debian/Ubuntu | `light-cut-soundz_*_amd64.deb` |

            ### Homebrew (macOS)
            ```
            brew tap light-cut-soundz/tap
            brew install --cask lightcutsoundz
            ```
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  update-homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/light-cut-soundz/light-cut-soundz/git/refs/tags --jq '.[-1].ref | split("/") | .[-1]')
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download macOS DMGs and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG=${{ steps.tag.outputs.name }}
          VERSION=${{ steps.tag.outputs.version }}
          gh release download "$TAG" \
            --repo light-cut-soundz/light-cut-soundz \
            --pattern "LightCutSoundZ_${VERSION}_aarch64.dmg" \
            --pattern "LightCutSoundZ_${VERSION}_x64.dmg"
          echo "arm=$(sha256sum "LightCutSoundZ_${VERSION}_aarch64.dmg" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "intel=$(sha256sum "LightCutSoundZ_${VERSION}_x64.dmg"   | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Clone homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/light-cut-soundz/homebrew-tap.git

      - name: Write cask formula
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          SHA_ARM: ${{ steps.sha.outputs.arm }}
          SHA_INTEL: ${{ steps.sha.outputs.intel }}
        run: |
          python3 - <<'PYEOF'
          import os
          v = os.environ['VERSION']
          arm = os.environ['SHA_ARM']
          intel = os.environ['SHA_INTEL']
          base = "https://github.com/light-cut-soundz/light-cut-soundz/releases/download"
          content = f'''cask "lightcutsoundz" do
            version "{v}"

            on_arm do
              url "{base}/v#{{version}}/LightCutSoundZ_#{{version}}_aarch64.dmg"
              sha256 "{arm}"
            end

            on_intel do
              url "{base}/v#{{version}}/LightCutSoundZ_#{{version}}_x64.dmg"
              sha256 "{intel}"
            end

            name "LightCutSoundZ"
            desc "Fast, minimal desktop audio editor"
            homepage "https://light-cut-soundz.github.io/light-cut-soundz/"

            app "LightCutSoundZ.app"

            zap trash: [
              "~/Library/Application Support/dev.lightcutsoundz",
              "~/Library/Preferences/dev.lightcutsoundz.plist",
              "~/Library/Saved Application State/dev.lightcutsoundz.savedState",
            ]
          end
          '''
          with open('homebrew-tap/Casks/lightcutsoundz.rb', 'w') as f:
              f.write(content)
          PYEOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/lightcutsoundz.rb
          git commit -m "Update lightcutsoundz to ${{ steps.tag.outputs.version }}"
          git push

  publish-snap:
    name: Publish Snap
    needs: [release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Get latest tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/light-cut-soundz/light-cut-soundz/git/refs/tags --jq '.[-1].ref | split("/") | .[-1]')
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Update version in snapcraft.yaml
        run: |
          sed -i "s/^version: .*/version: '${{ steps.tag.outputs.version }}'/" snap/snapcraft.yaml

      - uses: snapcore/action-build@v1
        id: build

      - name: Decode snap credentials
        run: |
          {
            echo 'SNAPCRAFT_STORE_CREDENTIALS<<SNAP_CREDS_EOF'
            echo "${{ secrets.SNAPCRAFT_TOKEN }}" | base64 -d
            echo 'SNAP_CREDS_EOF'
          } >> "$GITHUB_ENV"

      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ env.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
