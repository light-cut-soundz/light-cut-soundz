name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: LightCutSoundZ ${{ github.ref_name }}
          releaseBody: |
            ## LightCutSoundZ ${{ github.ref_name }}

            ### Téléchargements

            | Plateforme | Fichier |
            |---|---|
            | macOS Apple Silicon | `LightCutSoundZ_*_aarch64.dmg` |
            | macOS Intel | `LightCutSoundZ_*_x64.dmg` |
            | Linux AppImage | `LightCutSoundZ_*_amd64.AppImage` |
            | Linux Debian/Ubuntu | `light-cut-soundz_*_amd64.deb` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
