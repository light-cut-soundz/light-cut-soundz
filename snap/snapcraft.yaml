name: lightcutsoundz
base: core22
version: '0.1.0'
summary: Éditeur audio desktop léger et gratuit
description: |
  LightCutSoundZ est un éditeur audio desktop léger et gratuit pour Linux.
  Décodage pur Rust, aperçu en temps réel.

  LightCutSoundZ is a lightweight free desktop audio editor for Linux.
  Pure Rust decoding, real-time preview.

grade: stable
confinement: strict

apps:
  lightcutsoundz:
    command: usr/bin/lightcutsoundz
    extensions: [gnome]
    plugs:
      - audio-playback
      - home
      - removable-media

parts:
  lightcutsoundz:
    plugin: nil
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - pkg-config
      - libssl-dev
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - libgstreamer1.0-0
    override-build: |
      rustup default stable
      npm ci
      npm run build
      cd src-tauri
      cargo build --release
      install -Dm755 target/release/lightcutsoundz \
        "$CRAFT_PART_INSTALL/usr/bin/lightcutsoundz"
