name: lightcutsoundz
base: core24
version: '0.1.4'
summary: Éditeur audio desktop léger et gratuit
icon: src-tauri/icons/icon.png
description: |
  LightCutSoundZ est un éditeur audio desktop léger et gratuit pour Linux.
  Décodage pur Rust, aperçu en temps réel.

  LightCutSoundZ is a lightweight free desktop audio editor for Linux.
  Pure Rust decoding, real-time preview.

grade: stable
confinement: strict

apps:
  lightcutsoundz:
    command: usr/bin/lightcutsoundz
    extensions: [gnome]
    desktop: usr/share/applications/lightcutsoundz.desktop
    plugs:
      - audio-playback
      - home
      - removable-media

parts:
  lightcutsoundz:
    plugin: nil
    source: .
    build-snaps:
      - node/20/stable
      - rustup/latest/stable
    build-packages:
      - pkg-config
      - libssl-dev
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - librsvg2-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
      - libayatana-appindicator3-1
      - librsvg2-2
      - gstreamer1.0-plugins-base
      - gstreamer1.0-plugins-good
      - libgstreamer1.0-0
    override-build: |
      rustup default stable
      npm ci
      npm run build
      cargo build --release -p lightcutsoundz
      install -Dm755 target/release/lightcutsoundz \
        "$CRAFT_PART_INSTALL/usr/bin/lightcutsoundz"
      install -Dm644 src-tauri/icons/128x128.png \
        "$CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/lightcutsoundz.png"
      mkdir -p "$CRAFT_PART_INSTALL/usr/share/applications"
      printf '[Desktop Entry]\nName=LightCutSoundZ\nComment=Lightweight audio editor\nExec=lightcutsoundz\nIcon=lightcutsoundz\nType=Application\nCategories=AudioVideo;Audio;\n' \
        > "$CRAFT_PART_INSTALL/usr/share/applications/lightcutsoundz.desktop"
